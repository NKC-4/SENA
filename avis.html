<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENA Site Web</title>
    <link rel="shortcut icon" href="images/favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto+Slab:wght@100..900&display=swap"
        rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto+Slab:wght@100..900&family=Sekuya&display=swap"
        rel="stylesheet">
    <!--Font Awosome link-->
    <script src="https://kit.fontawesome.com/8abf08ec08.js" crossorigin="anonymous"></script>
    <script src="form.js" defer></script>
</head>

<body>
    <div class="page-bg">
        <header class="header">

            <div class="logo__container">
                <img src="images/logo.png" class="logo" alt="logo de halo">
            </div>

            <nav class="navbar">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                    <ul class="navbar__list">
                        <li class="item"><a href="index.html" class="link">Accueil</a></li>
                        <li class="item"><a href="reading.html" class="link">Page de lecture</a></li>
                        <li class="item"><a href="avis.html" class="link">Commenter</a></li>
                    </ul>
                </div>
            </nav>
        </header>

        <main>
            <section class="avis__section">
                <h1 class="color-burlywood fw-bold avis__title">LAISSER VOTRE COMMENTAIRE</h1>

                <form>
                    <P id="alert"></P>
                    <div class="first__infos">
                        <div class="nom__info">
                            <label for="name">Nom</label>
                            <input type="text" name="Votre Nom" id="name">
                        </div>

                        <div class="prenom__info">
                            <label for="prenom">Prenom</label>
                            <input type="text" name="Votre Prenom" id="firstname">
                        </div>
                    </div>

                    <div class="second__infos">
                        <label for="email">Address Email</label>
                        <input type="email" name="Votre Email" id="email" class="email">
                        <label for="avis">Votre Commentaire</label>
                        <textarea name="avis" id="comment"></textarea>
                        <input type="submit" class="submit__btn" id="submit__btn">
                    </div>

                </form>
            </section>
        </main>

        <footer>
            <div class="footer">
                <div class="header__boton"><a href="#hero__head "><i class="fa-solid fa-arrow-up"></i></a></div>
                <p class="mention">© 2026 SENA<span>KdC_Ser</span>. Tous droits réservés</p>
            </div>

            <div>
                <ul class="navbar__list foorter__nav">
                    <li class="item"><a href="index.html" class="link">Accueil</a></li>
                    <li class="item"><a href="reading.html" class="link">Page de lecture</a></li>
                    <li class="item"><a href="avis.html" class="link">Commenter</a></li>
                </ul>
            </div>

            <div class="logo__container logo__footer">
                <img src="images/logo.png" class="logo" alt="logo de halo">
            </div>
        </footer>
</body>

</html>
